<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="#0f172a"/>
  <rect width="1400" height="560" fill="url(#bg)" opacity="0.15"/>

  <!-- Icon -->
  <g transform="translate(110 168)">
    <rect width="224" height="224" rx="46" fill="url(#iconbg)"/>
    <circle cx="36" cy="46" r="7" fill="#fff" opacity="0.9"/>
    <circle cx="59" cy="46" r="7" fill="#fff" opacity="0.6"/>
    <circle cx="82" cy="46" r="7" fill="#fff" opacity="0.4"/>
    <line x1="22" y1="73" x2="202" y2="73" stroke="#fff" stroke-width="3" opacity="0.4"/>
    <path
      d="M134 92 L86 152 L110 152 L94 190 L154 130 L130 130 L150 92 Z"
      fill="#ffffff"
      stroke="#0f172a"
      stroke-width="4"
      stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(390 240)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-size="78"
          font-weight="700"
          letter-spacing="-0.025em"
          fill="#ffffff">fast-browser</text>
    <text y="56"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-size="28"
          font-weight="500"
          letter-spacing="0.005em"
          fill="#cbd5e1">A local AI agent that completes tasks in your active Chrome tab.</text>
    <text y="92"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-size="22"
          font-weight="400"
          letter-spacing="0.005em"
          fill="#94a3b8">Bring your own Claude / Gemini / OpenRouter key. No server. Open source.</text>
  </g>

  <!-- Receipts strip -->
  <g transform="translate(390 408)">
    <g transform="translate(0 0)">
      <rect width="186" height="62" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#94a3b8" text-transform="uppercase">QUIZ — 40 QUESTIONS</text>
      <text x="14" y="46" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff">40/40 · 4m44s</text>
    </g>
    <g transform="translate(202 0)">
      <rect width="186" height="62" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#94a3b8" text-transform="uppercase">MEDIAN STEP</text>
      <text x="14" y="46" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff">~785 ms</text>
    </g>
    <g transform="translate(404 0)">
      <rect width="186" height="62" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#94a3b8" text-transform="uppercase">PER TASK</text>
      <text x="14" y="46" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff">$0.005 – $0.40</text>
    </g>
  </g>
</svg>
