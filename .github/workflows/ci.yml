name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm -r typecheck

      # Skip the e2e test on CI — it needs a graphical Chromium and a real
      # API key. The unit tests cover the chrome.debugger client and all
      # core logic.
      - name: Test (excluding live e2e)
        env:
          SKIP_EXTENSION_E2E: "1"
        run: pnpm -r test
